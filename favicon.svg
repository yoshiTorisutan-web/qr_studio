  <rect x="3" y="18" width="11" height="11" rx="1" fill="#e94560"/>
  <rect x="5" y="20" width="7" height="7" rx="0.5" fill="#1a1a2e"/>
  <rect x="7" y="22" width="3" height="3" fill="#e94560"/>
  <!-- data modules (bottom-right area) -->
  <rect x="18" y="18" width="3" height="3" fill="#e94560"/>
  <rect x="23" y="18" width="3" height="3" fill="#e94560"/>
  <rect x="27" y="18" width="2" height="2" fill="#e94560"/>
  <rect x="18" y="23" width="2" height="2" fill="#e94560"/>
  <rect x="22" y="22" width="3" height="3" fill="#e94560"/>
  <rect x="27" y="23" width="2" height="3" fill="#e94560"/>
  <rect x="18" y="27" width="3" height="2" fill="#e94560"/>
  <rect x="23" y="27" width="2" height="2" fill="#e94560"/>
  <rect x="27" y="27" width="2" height="2" fill="#e94560"/>
</svg>
