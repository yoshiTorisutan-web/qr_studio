<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- top-left finder pattern -->
  <rect x="3" y="3" width="11" height="11" rx="1" fill="#e94560"/>
  <rect x="5" y="5" width="7" height="7" rx="0.5" fill="#1a1a2e"/>
  <rect x="7" y="7" width="3" height="3" fill="#e94560"/>
  <!-- top-right finder pattern -->
  <rect x="18" y="3" width="11" height="11" rx="1" fill="#e94560"/>
  <rect x="20" y="5" width="7" height="7" rx="0.5" fill="#1a1a2e"/>
  <rect x="22" y="7" width="3" height="3" fill="#e94560"/>
